# CareLog Flyway Configuration
#
# Database migrations for CareLog application
# https://flywaydb.org/documentation/configuration/configfile

# JDBC URL - will be overridden by environment variables in production
flyway.url=jdbc:postgresql://localhost:5432/carelog

# Credentials - will be overridden by environment variables in production
# DO NOT commit actual credentials to version control
flyway.user=${DB_USERNAME}
flyway.password=${DB_PASSWORD}

# Schema
flyway.defaultSchema=public
flyway.schemas=public

# Migration locations
flyway.locations=filesystem:./migrations

# Migration naming
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# Encoding
flyway.encoding=UTF-8

# Baseline
flyway.baselineOnMigrate=true
flyway.baselineVersion=0

# Validation
flyway.validateOnMigrate=true
flyway.validateMigrationNaming=true

# Clean disabled for safety
flyway.cleanDisabled=true

# Placeholders
flyway.placeholderReplacement=true

# Output
flyway.outputQueryResults=false

# Mixed migrations
flyway.mixed=false

# Group migrations
flyway.group=false

# Installed by
flyway.installedBy=carelog-deployment
